services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragm-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    networks:
      - boq_net
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/seeds.py:/app/seeds.py
      - ./backend/seeds:/app/seeds
      - .:/ragm-root
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 3001
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ragm-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    networks:
      - boq_net
    depends_on:
      - backend
    volumes:
      - ./frontend/.env:/app/.env
    command: npx vite --host 0.0.0.0

networks:
  boq_net:
    external: true
    name: new_boq_network
